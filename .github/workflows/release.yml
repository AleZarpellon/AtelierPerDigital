name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - run: cd BE && mvn clean package -DskipTests
      - run: cd FE && npm install
      - run: cd FE && npx tsc -p tsconfig.electron.json
      - run: cd FE && npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
