<header
  class="fixed top-0 right-0 left-0 z-40 border-b border-indigo-900 bg-indigo-950 py-4 shadow-[0_10px_40px_rgba(15,23,42,0.35)]"
>
  <button
    type="button"
    class="launcher-link flex items-center gap-2 rounded-full border border-indigo-800 ml-2 px-4 py-2 text-sm font-semibold text-indigo-100 transition-colors hover:border-amber-300 hover:text-amber-200"
    (click)="goToLauncher()"
  >
    <i class="pi pi-th-large"></i>
    <span>Applicazioni</span>
  </button>

  <div class="max-w flex items-center justify-center mb-3">
    <span class="text-title font-semibold text-lg whitespace-nowrap tracking-[0.18em] uppercase">
      Gestione Stipendio
    </span>

    <div class="header-spacer" aria-hidden="true"></div>
  </div>

  <div class="max-w flex justify-center px-6">
    <p-menubar [model]="navItems()" />
  </div>
</header>
